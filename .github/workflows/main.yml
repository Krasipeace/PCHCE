name: Publish

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore and Build
        run: |
          dotnet restore
          dotnet build --configuration Release --no-restore

      - name: Upload Workspace Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: full-workspace
          path: .
          include-hidden-files: true

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Download Workspace
        uses: actions/download-artifact@v4
        with:
          name: full-workspace
      - name: Run Tests
        run: dotnet test --configuration Release --no-build
          
  publish:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Download Workspace
        uses: actions/download-artifact@v4
        with:
          name: full-workspace

      - name: Pack
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          dotnet pack Core/Core.csproj --configuration Release --no-build -p:PackageVersion=$VERSION -o nupkg

      - name: Push to NuGet
        run: dotnet nuget push nupkg/*.nupkg --api-key ${{ secrets.NUGET_TOKEN }} --source https://api.nuget.org/v3/index.json --skip-duplicate
